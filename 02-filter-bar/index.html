    <h1>02: Filter bar</h1>
    <p>Fix the CSS so this row of filter buttons wraps onto new lines when the window is narrow, with an even gap between them. Two things are wrong, so fix them and then narrow the window to watch the buttons reflow. Do not change the HTML.</p>
