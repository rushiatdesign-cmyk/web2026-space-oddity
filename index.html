      }
      .lead {
        color: #444;
        margin: 0 0 2rem;
      }
      .list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        border: 1px solid #e0e0e2;
        border-radius: 6px;
        background: #fff;
        color: inherit;
        text-decoration: none;
      }
      .row:hover {
        border-color: #2563eb;
      }
      .num {
        color: #888;
        font-variant-numeric: tabular-nums;
      }
      .row .body {
        flex: 1;
      }
      .row .body strong {
        display: block;
      }
      .row .body span {
        color: #666;
        font-size: 0.9rem;
      }
      .tag {
        font-size: 0.8rem;
        color: #666;
      }
    </style>
