<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kata 3 — The Photo Row</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="katas.css">
</head>
<body>
  <header class="page-header">
    <p class="kicker">Kata 3</p>
    <h1>The Photo Row</h1>
    <p>Three photos sharing a row equally, with consistent gaps, that don't overflow when the window gets narrow. Edit <code>.photo-row</code> and <code>.photo-row img</code> in <code>katas.css</code>. Hints: <code>display: flex</code> and <code>gap</code> on the row; every image wants <code>max-width: 100%</code> (and <code>flex: 1</code> to share the space).</p>
  </header>

  <div class="photo-row">
    <img src="../03-gallery-wall/images/great-wave.jpg" alt="The Great Wave off Kanagawa by Hokusai">
    <img src="../03-gallery-wall/images/wheat-field.jpg" alt="Wheat Field with Cypresses by Van Gogh">
    <img src="../03-gallery-wall/images/harvesters.jpg" alt="The Harvesters by Bruegel">
  </div>
</body>
</html>
